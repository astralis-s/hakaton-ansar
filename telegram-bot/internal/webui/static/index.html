<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Амана — Чат поддержки</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Экран входа -->
  <div id="login" class="login hidden">
    <form id="login-form" class="login-card">
      <div class="login-logo">Амана</div>
      <h1>Чат поддержки</h1>
      <p class="muted">Введите пароль менеджера, чтобы открыть входящие из Telegram.</p>
      <input id="login-password" type="password" placeholder="Пароль" autocomplete="current-password" />
      <button type="submit">Войти</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>

  <!-- Основной интерфейс -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <header class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">А</span>
          <div>
            <div class="brand-title">Амана</div>
            <div class="brand-sub">Чат с заказчиками</div>
          </div>
        </div>
        <span id="conn" class="conn" title="Связь с сервером"></span>
      </header>
      <div id="chats" class="chats"></div>
    </aside>

    <main class="thread-pane">
      <div id="empty" class="empty">
        <div class="empty-illo">💬</div>
        <p>Выберите чат слева, чтобы ответить заказчику.</p>
        <p class="muted small">Заказчики пишут боту в Telegram — их сообщения появляются здесь.</p>
      </div>

      <section id="conversation" class="conversation hidden">
        <header class="thread-head">
          <div class="avatar" id="head-avatar"></div>
          <div class="thread-head-info">
            <div id="head-name" class="thread-head-name"></div>
            <div id="head-phone" class="thread-head-phone"></div>
          </div>
        </header>
        <div id="messages" class="messages"></div>
        <form id="reply-form" class="reply">
          <textarea id="reply-input" rows="1" placeholder="Написать ответ заказчику…"></textarea>
          <button id="reply-send" type="submit" title="Отправить (Enter)">➤</button>
        </form>
        <div id="reply-error" class="reply-error"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
