services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: amana
      POSTGRES_PASSWORD: amana
      POSTGRES_DB: amana
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amana -d amana"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://amana:amana@postgres:5432/amana?sslmode=disable
      MIGRATE_ON_BOOT: "true"
      JWT_SECRET: dev-secret-change-me
      LOG_LEVEL: info
      LOG_FORMAT: json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
