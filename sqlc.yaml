# sqlc configuration (CLAUDE.md §4: all SQL is generated by sqlc, no raw SQL in code).
#
# One shared schema (the goose migrations) feeds every module; each bounded
# context keeps its own queries and generated package under its infra/ folder.
# A new block is added as each module is implemented (Phases 2-5). Run: `make sqlc`.
version: "2"
sql:
  - name: iam
    engine: postgresql
    schema: migrations
    queries: internal/modules/iam/infra/queries
    gen:
      go: &gen
        package: sqlcgen
        out: internal/modules/iam/infra/sqlcgen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
  - name: catalog
    engine: postgresql
    schema: migrations
    queries: internal/modules/catalog/infra/queries
    gen:
      go:
        <<: *gen
        out: internal/modules/catalog/infra/sqlcgen
  - name: crm
    engine: postgresql
    schema: migrations
    queries: internal/modules/crm/infra/queries
    gen:
      go:
        <<: *gen
        out: internal/modules/crm/infra/sqlcgen
  - name: financing
    engine: postgresql
    schema: migrations
    queries: internal/modules/financing/infra/queries
    gen:
      go:
        <<: *gen
        out: internal/modules/financing/infra/sqlcgen
